<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrations &middot; Apache Flink Lab Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0624;
            --bg-surface: rgba(255,255,255,0.04);
            --teal: #05b89c;
            --teal-glow: rgba(5,184,156,0.25);
            --purple: #4e21e8;
            --purple-light: #7c5cf5;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.55);
            --text-dim: rgba(255,255,255,0.3);
            --border: rgba(255,255,255,0.07);
            --radius: 14px;
            --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dot-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 100%);
        }

        .glow-orb {
            position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0;
        }
        .glow-orb.purple {
            width: 600px; height: 600px; top: -15%; left: 40%;
            background: rgba(78,33,232,0.12);
            animation: orbFloat 20s ease-in-out infinite;
        }
        .glow-orb.teal {
            width: 400px; height: 400px; bottom: -10%; right: -5%;
            background: rgba(5,184,156,0.06);
            animation: orbFloat 25s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .anim {
            opacity: 0;
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .anim-d1 { animation-delay: 0.08s; }
        .anim-d2 { animation-delay: 0.18s; }
        .anim-d3 { animation-delay: 0.28s; }

        .container {
            position: relative; z-index: 1;
            max-width: 920px; margin: 0 auto; padding: 36px 28px 72px;
        }

        /* Header */
        .header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 32px;
        }
        .header .logo {
            width: 160px; height: auto; filter: brightness(0) invert(1);
        }
        .header h1 {
            font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 60%, var(--teal) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--teal); text-decoration: none; font-size: 0.88rem; font-weight: 600;
            margin-bottom: 24px; border-bottom: 1px solid rgba(5,184,156,0.35);
            transition: all 0.2s ease;
        }
        .back-link:hover { border-color: var(--teal); }

        .section-label {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.16em; color: var(--teal); margin-bottom: 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* Table card */
        .table-card {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 32px; position: relative; overflow: hidden;
        }
        .table-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(5,184,156,0.3), transparent);
        }

        table {
            width: 100%; border-collapse: collapse;
        }
        th {
            text-align: left; font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim);
            padding: 0 14px 14px; border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px; font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        tr:last-child td { border-bottom: none; }
        td:first-child { font-weight: 500; }

        td a {
            color: var(--teal); text-decoration: none; font-family: var(--mono); font-size: 0.82rem;
            border-bottom: 1px solid rgba(5,184,156,0.35); transition: all 0.2s ease;
        }
        td a:hover { border-color: var(--teal); }

        .empty-msg {
            text-align: center; color: var(--text-muted); font-size: 0.95rem; padding: 32px 0;
        }

        .footer {
            text-align: center; color: var(--text-dim); font-size: 0.78rem;
            padding-top: 20px; margin-top: 40px; border-top: 1px solid var(--border);
            letter-spacing: 0.04em;
        }

        @media (max-width: 768px) {
            .container { padding: 24px 16px 56px; }
            .header { flex-direction: column; text-align: center; }
            .header h1 { font-size: 1.3rem; }
            .table-card { padding: 20px 16px; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="dot-grid"></div>
    <div class="glow-orb purple"></div>
    <div class="glow-orb teal"></div>

    <div class="container">
        <div class="header anim anim-d1">
            <img class="logo" src="/static/logo.png" onerror="this.onerror=null;this.src='../static/logo.png';" alt="Ververica">
            <h1>All Registrations</h1>
        </div>

        <a class="back-link anim anim-d1" href="/">&larr; Back to registration form</a>

        <div class="section-label anim anim-d2">Participants</div>
        <div class="table-card anim anim-d3" id="table-container">
            <p class="empty-msg">No registrations yet.</p>
        </div>
        <script>
            // Server injects registration data when served by Flask
            var registrations = {{ registrations | default([]) | tojson }};
            (function() {
                var container = document.getElementById('table-container');
                if (!registrations || registrations.length === 0) return;
                var html = '<table><thead><tr>';
                html += '<th>ID</th><th>Name</th><th>Email</th><th>Company</th><th>Role</th><th>Lab URL</th><th>Created at</th>';
                html += '</tr></thead><tbody>';
                registrations.forEach(function(r) {
                    html += '<tr>';
                    html += '<td>' + (r.id || '') + '</td>';
                    html += '<td>' + (r.name || '') + ' ' + (r.surname || '') + '</td>';
                    html += '<td>' + (r.email || '') + '</td>';
                    html += '<td>' + (r.company || '') + '</td>';
                    html += '<td>' + (r.role || '') + '</td>';
                    html += '<td><a href="http://' + (r.lab_url || '') + '">' + (r.lab_url || '') + '</a></td>';
                    html += '<td>' + (r.created_at || '') + '</td>';
                    html += '</tr>';
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            })();
        </script>

        <div class="footer anim anim-d3">Ververica &middot; Apache Flink Lab Day</div>
    </div>
</body>
</html>
