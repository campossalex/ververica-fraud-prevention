
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register &middot; Apache Flink Lab Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        @property --border-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        :root {
            --bg-deep: #0a0624;
            --bg-base: #120A3D;
            --bg-surface: rgba(255,255,255,0.04);
            --bg-surface-hover: rgba(255,255,255,0.07);
            --teal: #05b89c;
            --teal-glow: rgba(5,184,156,0.25);
            --purple: #4e21e8;
            --purple-light: #7c5cf5;
            --purple-glow: rgba(78,33,232,0.3);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.55);
            --text-dim: rgba(255,255,255,0.3);
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(78,33,232,0.5);
            --radius: 14px;
            --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Dot grid background */
        .dot-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 100%);
        }

        /* Ambient glow orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb.purple {
            width: 600px; height: 600px;
            top: -15%; left: 40%;
            background: rgba(78,33,232,0.12);
            animation: orbFloat 20s ease-in-out infinite;
        }
        .glow-orb.teal {
            width: 400px; height: 400px;
            bottom: -10%; right: -5%;
            background: rgba(5,184,156,0.06);
            animation: orbFloat 25s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 560px;
            margin: 0 auto;
            padding: 36px 28px 72px;
        }

        /* Staggered entrance animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .anim {
            opacity: 1;
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .anim-d1 { animation-delay: 0.08s; }
        .anim-d2 { animation-delay: 0.18s; }
        .anim-d3 { animation-delay: 0.28s; }
        .anim-d4 { animation-delay: 0.38s; }

        @media (prefers-reduced-motion: reduce) {
            .anim { animation: none; opacity: 1; }
        }

        /* Hero with animated gradient border */
        .hero-wrap {
            position: relative;
            padding: 2px;
            border-radius: 20px;
            margin-bottom: 40px;
            background: conic-gradient(from var(--border-angle), var(--purple), var(--teal), var(--purple-light), var(--teal), var(--purple));
            animation: rotateBorder 6s linear infinite;
        }

        @keyframes rotateBorder {
            to { --border-angle: 360deg; }
        }

        .hero-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: conic-gradient(from var(--border-angle), var(--purple), var(--teal), var(--purple-light), var(--teal), var(--purple));
            filter: blur(24px);
            opacity: 0.35;
            z-index: -1;
            animation: rotateBorder 6s linear infinite;
        }

        .hero {
            background: var(--bg-deep);
            border-radius: 18px;
            text-align: center;
            padding: 36px 36px 32px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(78,33,232,0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero .logo {
            position: relative;
            display: block;
            width: 220px;
            height: auto;
            margin: 0 auto 24px;
            filter: brightness(0) invert(1);
        }

        .hero h1 {
            position: relative;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .hero p {
            position: relative;
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Flash messages */
        .flash {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .flash.success {
            background: rgba(5, 184, 156, 0.12);
            border: 1px solid rgba(5, 184, 156, 0.35);
            color: var(--teal);
        }
        .flash.error {
            background: rgba(232, 33, 58, 0.12);
            border: 1px solid rgba(232, 33, 58, 0.35);
            color: #ff5c6c;
        }

        /* Form card */
        .form-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(5,184,156,0.3), transparent);
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--teal);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* Form fields */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Manrope', system-ui, sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-group input::placeholder {
            color: var(--text-dim);
        }

        .form-group input:focus {
            border-color: rgba(78,33,232,0.5);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(78,33,232,0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Submit button */
        .submit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 8px;
            padding: 15px 36px;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s ease;
            box-shadow: 0 4px 24px var(--purple-glow);
        }

        .submit-btn:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 40px rgba(78,33,232,0.45);
        }

        .submit-btn svg {
            transition: transform 0.3s ease;
        }

        .submit-btn:hover svg {
            transform: translateX(3px);
        }

        /* Footer */
        .footer {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.78rem;
            padding-top: 20px;
            margin-top: 40px;
            border-top: 1px solid var(--border);
            letter-spacing: 0.04em;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 24px 16px 56px; }
            .hero { padding: 28px 24px 24px; }
            .hero h1 { font-size: 1.7rem; }
            .hero .logo { width: 180px; }
            .form-card { padding: 24px 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Background layers -->
    <div class="dot-grid"></div>
    <div class="glow-orb purple"></div>
    <div class="glow-orb teal"></div>

    <div class="container">
        <!-- Hero -->
        <div class="hero-wrap anim anim-d1">
            <div class="hero">
                <img class="logo" src="/static/logo_green.png" onerror="this.onerror=null;this.src='../static/logo_green.png';" alt="Ververica">
                <h1>Apache Flink Lab Day</h1>
                <p>Register to get access to your hands-on lab environment.</p>
            </div>
        </div>

        <!-- Flash messages (injected by server via JS) -->
        <div id="flash-container"></div>
        <script>
            var flashMessages = [];
            (function() {
                var container = document.getElementById('flash-container');
                flashMessages.forEach(function(m) {
                    var div = document.createElement('div');
                    div.className = 'flash ' + m[0] + ' anim anim-d2';
                    div.textContent = m[1];
                    container.appendChild(div);
                });
            })();
        </script>

        <!-- Registration form -->
        <div class="section-label anim anim-d2">Registration</div>
        <div class="form-card anim anim-d3">
            <form method="post" action="/">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input id="name" name="name" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label for="surname">Surname</label>
                        <input id="surname" name="surname" placeholder="Last name" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="company">Company</label>
                        <input id="company" name="company" placeholder="Your company" required>
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <input id="role" name="role" placeholder="Your role" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@company.com" required>
                </div>

                <button type="submit" class="submit-btn">
                    Sign up
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 10h10M11 6l4 4-4 4"/></svg>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer anim anim-d4">Ververica &middot; Apache Flink Lab Day</div>
    </div>
</body>
</html>
